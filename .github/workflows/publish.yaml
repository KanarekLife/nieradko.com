name: Publish website
on: 
  push:
    branches:
      - "master"
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
     - name: Git checkout
       uses: actions/checkout@v2
       with:
        submodules: true
        fetch-depth: 0
     - name: Setup Hugo
       uses: peaceiris/actions-hugo@v2
       with:
          hugo-version: '0.82.0'
          extended: true
     - uses: actions/cache@v2
       with:
         path: /tmp/hugo_cache
         key: ${{ runner.os }}-hugomod-${{ hashFiles('**/go.sum') }}
         restore-keys: |
           ${{ runner.os }}-hugomod-
     - name: Build
       run: hugo --gc --minify --verbose
     - name: Deploy
       uses: peaceiris/actions-gh-pages@v3
       with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        cname: www.nieradko.com