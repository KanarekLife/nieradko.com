baseURL = "https://www.nieradko.com"
languageCode = "pl-PL"
title = "Stanisław Nieradko"
theme = "PaperMod"

enableInlineShortcodes = true
enableRobotsTXT = true
enableEmoji = true

[minify]
    disableXML = true
    minifyOutput = true
[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true

[menu]
    [[menu.main]]
        name = "Posts"
        url = "/posts"
        weight = 5
    [[menu.main]]
        name = "Projects"
        url = "/projects"
         weight = 10
    [[menu.main]]
        name = "About Me"
        url = "/about"
        weight = 15
    [[menu.main]]
        name = "🔎 Search"
        url = "/search"
        weight = 999

[taxonomies]
    category = "category"
    tag = "tags"
    series = "series"
[params]
    keywords = ["blog", "KanarekLife", "Stanisław Nieradko"]
    env = "production"
    author = "Stanisław Nieradko"
    description = "Welcome my portfolio / blog website."
    defaultTheme = "auto"
    displayFullLangName = true
    showReadingTime = true
    showBreadCrumbs = true
    showToc = true
    showPostNavLinks = true
    [params.profileMode]
        enabled = true
        subtitle = "Self-Taught full-stack developer using C# and TypeScript."
        imageUrl = "/avatar.jpg"
    [params.homeInfoParams]
        [[params.socialIcons]]
            name = "Github"
            url = "https://github.com/KanarekLife"
        [[params.socialIcons]]
            name = "Website"
            url = "https://nieradko.com"
        [[params.socialIcons]]
            name = "Rss"
            url = "/index.xml"
    [params.label]
        icon = "/avatar.jpg"
        iconHeight = 35
    [params.assets]
        favicon = "/favicon.ico"


[outputs]
    home = ['HTML', 'RSS', 'JSON']